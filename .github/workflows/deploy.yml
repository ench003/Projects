name: Деплой на VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Проверка кода
    runs-on: ubuntu-latest
    steps:
      - name: Копирование кода
        uses: actions/checkout@v4

      - name: Проверка docker-compose.yml
        run: docker compose -f docker/project_1/docker-compose.yml config

      - name: Запуск контейнеров
        run: |
          cd docker/project_1
          docker compose up -d
          sleep 10
          curl --fail http://localhost:8081
          curl --fail http://localhost:8082

      - name: Очистка
        if: always()
        run: |
          cd docker/project_1
          docker compose down

  deploy:
    name: Деплой на VPS
    runs-on: ubuntu-latest
    needs: [test]
    if: success()
    steps:
      - name: Копирование кода
        uses: actions/checkout@v4

      - name: Деплой через ssh
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd ~/projects
            git fetch origin main
            git reset --hard origin/main
            cd docker/project_1
            docker compose up -d --build
            docker image prune -f

      - name: Уведомление об успехе
        if: success()
        run: echo "Деплой завершен. Успех!✅"

      - name: Уведомление об ошибке
        if: failure()
        run: echo "❌Error❌ Деплой обвалился! Смотри логи."
