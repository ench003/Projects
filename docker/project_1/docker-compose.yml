services:
  web:
    container_name: project_1-web
    build: .
    ports:
      - "8081:81"
      - "8082:82"
    networks:
      - dockernet
    volumes:
      - ./site1:/usr/share/nginx/html/site1
      - ./site2:/usr/share/nginx/html/site2
    restart: unless-stopped

  db:
    container_name: project_1-db
    image: postgres:16
    environment:
      POSTGRES_USER: ench003
      POSTGRES_DB: user_db
      POSTGRES_PASSWORD: 123
    networks:
      - dockernet
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  admin:
    container_name: project_1-admin
    image: adminer
    ports:
      - "8083:8080"
    networks:
      - dockernet
    restart: unless-stopped

  nginx-exporter:
    container_name: project_1-NPE
    image: nginx/nginx-prometheus-exporter:1.5.1
    command:
      - --nginx.scrape-uri=http://web:80/stub_status
    ports:
      - "9113:9113"
    networks:
      - dockernet
    restart: unless-stopped

networks:
  dockernet:

volumes:
  pg_data:
